<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tawa College School Photos</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
    <script src="js/photoIndex.js"></script>
</head>
<body id="photos">
    <nav>
        <h1>Tawa College Alumni - Class Photos</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="photos.html">Photos</a></li>
        </ul>
    </nav>
    <div class="flex-row">
        <aside id="year-navigation">
            <label for="year-input"><h3>Browse or enter year:</h3></label>
            <div id="year-field">
                <input list="years" id="year-input" name="year-input">
                <span id="select-year">Go</span>
            </div>
            <datalist id="year-list"></datalist>
            <ul id="year-button-list"></ul>
        </aside>
        <main>
            <div id="year-title">
                <div class="balancer"></div>
                <h2></h2>
                <div id="pdf-download">
                    <p></p>
                    <a id="download-button" target="_blank">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </a>
                </div>
            </div>
            <div id="gallery"></div>
        </main>
    </div>
    <article id="expanded-overlay" title="Close photo">
        <div id="expanded-image" title="">
            <div id="close-button" title="Close photo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
            <img>
            <p></p>
        </div>
    </article>
</body>
</html>
