<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tawa College School Photos</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
    <script src="js/photoIndex.js"></script>
</head>
<body id="photos">
    <nav>
        <h1 class="wide-head">Tawa College Alumni - Class Photos</h1>
        <h1 class="narrow-head">Tawa College Alumni<br>Class Photos</h1>

        <div id="hamburger">
            <div id="bar1" class="bar"></div>
            <div id="bar2" class="bar"></div>
            <div id="bar3" class="bar"></div>
        </div>

        <div id="menu">
            <p>Menu</p>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="photos.html">Photos</a></li>
            </ul>
        </div>
    </nav>
    <div class="flex-row">
        <aside class="contracted">
            <label for="year-input"><h3>Browse or enter year:</h3></label>
            <div id="year-field">
                <input list="years" id="year-input" name="year-input">
                <span id="select-year">Go</span>
            </div>
            <datalist id="year-list"></datalist>
            <ul id="year-button-list"></ul>
            <div id="year-list-gradient">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>
        </aside>
        <main>
            <div id="year-title">
                <div class="balancer"></div>
                <h2></h2>
                <div id="pdf-download">
                    <p></p>
                    <a id="download-button" target="_blank">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </a>
                </div>
            </div>
            <div id="gallery"></div>
        </main>
    </div>
    <article id="expanded-overlay" title="Close photo">
        <div id="expanded-image" title="">
            <div id="close-button" title="Close photo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
            <div id="left-button" class="switch-photo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </div>
            <div id="right-button" class="switch-photo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </div>
            <img>
            <p></p>
        </div>
    </article>
    <footer>
        <a id="footer-logo" href="index.html">
            <img src="images/TC_logo.png" alt="Tawa College logo">
            <p>Tawa College Alumni Photos</p>
        </a>
        <div id="attribution">
            <p>&copy; Reuben Humphrey 2026</p>
        </div>
        <div id="external-links">
            <a href="https://www.tawacollege.school.nz/" target="_blank">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M15 7h3a5 5 0 0 1 5 5 5 5 0 0 1-5 5h-3m-6 0H6a5 5 0 0 1-5-5 5 5 0 0 1 5-5h3"></path>
                    <line x1="8" y1="12" x2="16" y2="12"></line>
                </svg>
                <p>Tawa College website</p>
            </a>
            <a href="https://tawacollegealumni.co.nz/" target="_blank">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M15 7h3a5 5 0 0 1 5 5 5 5 0 0 1-5 5h-3m-6 0H6a5 5 0 0 1-5-5 5 5 0 0 1 5-5h3"></path>
                    <line x1="8" y1="12" x2="16" y2="12"></line>
                </svg>
                <p>Alumni Website</p>
            </a>
        </div>
    </footer>
</body>
</html>
