<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tawa College School Photos</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
    <script src="js/photoIndex.js"></script>
</head>
<body id="photos">
    <nav>
        <h2>Tawa College Alumni - Class Photos</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="photos.html">Photos</a></li>
        </ul>
    </nav>
    <main>
        <section id="year-navigation">
            <label for="year-input"><h3>Browse or enter year:</h3></label>
            <div id="year-field">
                <input list="years" id="year-input" name="year-input">
                <span id="select-year">Go</span>
            </div>
            <datalist id="years"></datalist>
            <ul id="year-list"></ul>
        </section>
        <section id="gallery"></section>
        <div id="expanded-overlay">
            <div id="expanded-image">
                <div id="close-button">Close</div>
                <img src="" alt="">
                <p></p>
            </div>
        </div>
    </main>
</body>
</html>
